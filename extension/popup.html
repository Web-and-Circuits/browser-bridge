<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Browser Bridge</title>
<style>
body{font:13px -apple-system,system-ui,sans-serif;padding:12px;min-width:200px;color:#222}
.status{display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:#4caf50;flex-shrink:0}
.dot.err{background:#f44336}
.label{font-weight:500}
.url{font-size:11px;color:#666;margin-top:6px;word-break:break-all}
</style>
</head>
<body>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span class="label" id="label">checking…</span>
  </div>
  <div class="url" id="url"></div>
  <script src="popup.js" type="module"></script>
</body>
</html>
