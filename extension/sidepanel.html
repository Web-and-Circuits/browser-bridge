<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Browser Bridge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font: 13px/1.5 -apple-system, system-ui, sans-serif;
    color: #222;
    background: #fff;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Waiting screen ── */
  #waiting {
    position: relative;
    width: 100%;
    height: 100vh;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 48px;
  }
  #matrix-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  #waiting-ui {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  #waiting-ui.visible { opacity: 1; }
  #waiting-title {
    font-family: ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #00ff41;
    text-transform: uppercase;
    opacity: 0.7;
  }
  #waiting-desc {
    font-family: ui-monospace, monospace;
    font-size: 10px;
    color: #00ff41;
    opacity: 0.3;
    text-align: center;
    margin-bottom: 4px;
  }
  #waiting-steps {
    display: flex;
    flex-direction: column;
    gap: 6px;
    text-align: left;
    width: 100%;
    max-width: 260px;
  }
  .step {
    font-family: ui-monospace, monospace;
    font-size: 10px;
    color: #00ff41;
    opacity: 0.45;
    letter-spacing: 0.03em;
  }
  .step .dim { opacity: 0.5; }
  .step.done { opacity: 0.2; }
  .step.cmd {
    opacity: 0.85;
    background: rgba(0,255,65,0.07);
    border: 1px solid rgba(0,255,65,0.2);
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
    user-select: all;
    word-break: break-all;
  }
  .step.cmd:hover { opacity: 1; background: rgba(0,255,65,0.13); }
  .step.pulse { animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:0.35} 50%{opacity:0.65} }

  /* ── Active screen ── */
  #active {
    display: none;
    flex-direction: column;
    height: 100vh;
  }
  #active.visible { display: flex; }

  #header {
    padding: 11px 14px 10px;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .dot.connected    { background: #4caf50; }
  .dot.active       { background: #2196f3; }
  .dot.disconnected { background: #f44336; }
  #status-text { font-size: 12px; color: #555; }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    font-size: 11px;
    font-family: ui-monospace, monospace;
  }
  .log-entry     { color: #aaa; }
  .log-entry.ok  { color: #2e7d32; }
  .log-entry.err { color: #c62828; }
</style>
</head>
<body>

  <!-- Waiting for host -->
  <div id="waiting">
    <canvas id="matrix-canvas"></canvas>
    <div id="waiting-ui">
      <div id="waiting-title">browser bridge</div>
      <div id="waiting-desc">connects a local agent to this tab via files on disk</div>
      <div id="waiting-steps">
        <div class="step done">① extension loaded ✓</div>
        <div class="step">② clone the repo <span class="dim">(if you haven't)</span></div>
        <div class="step cmd">git clone https://github.com/Web-and-Circuits/browser-bridge</div>
        <div class="step">③ run the installer <span class="dim">(needs Node.js)</span></div>
        <div class="step cmd" id="waiting-cmd">—</div>
        <div class="step pulse" id="step-host">④ waiting for host to connect…</div>
      </div>
    </div>
  </div>

  <!-- Active -->
  <div id="active">
    <div id="header">
      <div class="dot" id="dot"></div>
      <span id="status-text">connected</span>
    </div>
    <div id="log"></div>
  </div>

  <script src="matrix.js" type="module"></script>
  <script src="sidepanel.js" type="module"></script>
</body>
</html>
