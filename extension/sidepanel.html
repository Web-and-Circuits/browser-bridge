<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Browser Bridge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font: 13px/1.5 -apple-system, system-ui, sans-serif;
    color: #222;
    background: #fff;
  }

  /* ── Welcome screen ── */
  #welcome {
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #welcome h1 { font-size: 15px; font-weight: 600; }
  #welcome p  { font-size: 12px; color: #555; line-height: 1.6; }
  #welcome code {
    font-family: ui-monospace, monospace;
    background: #f4f4f4;
    padding: 1px 5px;
    border-radius: 4px;
  }
  #grant-btn {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: #111;
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    align-self: flex-start;
  }
  #grant-btn:hover { background: #333; }
  #welcome-error { font-size: 11px; color: #c62828; }

  /* ── Active screen ── */
  #active {
    display: none;
    flex-direction: column;
    height: 100vh;
  }
  #active.visible { display: flex; }

  #header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ccc;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .dot.ready  { background: #4caf50; }
  .dot.active { background: #2196f3; }
  .dot.error  { background: #f44336; }
  #status-text { font-size: 12px; color: #555; flex: 1; }
  #reset-link {
    font-size: 10px;
    color: #bbb;
    cursor: pointer;
    text-decoration: underline;
  }
  #reset-link:hover { color: #888; }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    font-size: 11px;
    font-family: ui-monospace, monospace;
  }
  .log-entry     { color: #888; }
  .log-entry.ok  { color: #2e7d32; }
  .log-entry.err { color: #c62828; }
</style>
</head>
<body>

  <!-- First-run welcome -->
  <div id="welcome">
    <h1>Browser Bridge</h1>
    <p>
      Lets a local agent talk to this tab through files on disk.<br>
      One-time setup: grant read/write access to <code>~/.browser-bridge</code>.
    </p>
    <button id="grant-btn">Grant access →</button>
    <div id="welcome-error"></div>
  </div>

  <!-- Active state -->
  <div id="active">
    <div id="header">
      <div class="dot" id="dot"></div>
      <span id="status-text">Starting…</span>
      <span id="reset-link">reset</span>
    </div>
    <div id="log"></div>
  </div>

  <script src="sidepanel.js" type="module"></script>
</body>
</html>
